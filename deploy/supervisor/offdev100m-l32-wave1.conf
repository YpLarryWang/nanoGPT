[program:offdev100m_l32_wave1]
directory=/workspace/repo/nanoGPT
command=/bin/bash /workspace/repo/nanoGPT/run_babylm_offdev_100m_l32_wave1_4gpu.sh
environment=PY="/workspace/envs/nanogpt/bin/python",STAGGER_SECONDS="45"
autostart=false
autorestart=false
startsecs=5
stopasgroup=true
killasgroup=true
stopsignal=TERM
stopwaitsecs=120
redirect_stderr=true
stdout_logfile=/workspace/repo/nanoGPT/logs/offdev-100m-l32-wave1/supervisor.log
stdout_logfile_maxbytes=20MB
stdout_logfile_backups=3
